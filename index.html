<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raid Roster Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .drag-ghost { opacity: 0.4; background: #4b5563; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen">

    <div id="app" class="flex h-screen overflow-hidden">
        
        <aside class="w-80 bg-gray-800 border-r border-gray-700 flex flex-col h-full">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-xl font-bold text-amber-500">Specialists (SPs)</h2>
                <button @click="exportToExcel" class="bg-green-600 hover:bg-green-500 text-white font-bold py-1.5 px-3 rounded text-sm transition flex items-center gap-1">
                    💾 Download Excel
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                <div v-for="(sps, className) in spDatabase" :key="className" class="bg-gray-850 p-2 rounded">
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-2 border-b border-gray-700 pb-1">{{ className }}</h3>
                    <div :id="'source-' + className" class="grid grid-cols-4 gap-2 sp-source-grid" :data-class="className">
                        <div v-for="sp in sps" :key="sp.id" :data-id="sp.id" :data-img="sp.img" :data-spname="sp.name" class="cursor-grab bg-gray-750 p-1 rounded hover:bg-gray-700 transition flex flex-col items-center justify-center border border-gray-700">
                            <img :src="sp.img" :alt="sp.name" class="w-10 h-10 object-contain rounded" onerror="this.src='https://placehold.co/40x40/374151/ffffff?text=Error'"/>
                            <span class="text-[10px] text-gray-400 mt-1">{{ sp.tier }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 space-y-8 bg-gray-950">
            
            <div class="grid grid-cols-2 gap-6">
                <div v-for="element in ['Fire', 'Water', 'Light', 'Shadow']" :key="element" class="bg-gray-800 p-4 rounded-lg shadow-lg border border-gray-700">
                    <h3 class="text-lg font-bold mb-3 uppercase tracking-wide" :class="getElementColor(element)">{{ element }}</h3>
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400 text-xs">
                                <th class="py-1 w-8">#</th>
                                <th class="py-1 w-16 text-center">SP</th>
                                <th class="py-1 px-2">Nickname</th>
                                <th class="py-1 px-2">Debuff</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="idx in 5" :key="idx" class="border-b border-gray-700/50 last:border-0">
                                <td class="py-2 text-gray-500 font-mono font-bold">{{ idx }}</td>
                                <td class="py-1 flex justify-center">
                                    <div :id="'drop-' + element + '-' + idx" class="w-12 h-12 bg-gray-950 border border-dashed border-gray-600 rounded flex items-center justify-center target-dropzone relative group" :data-group="element" :data-idx="idx">
                                        <template v-if="elementsState[element][idx].img">
                                            <img :src="elementsState[element][idx].img" class="w-10 h-10 object-contain rounded" :title="elementsState[element][idx].spName"/>
                                            <button @click="clearSlot(element, idx)" class="absolute -top-1 -right-1 bg-red-650 text-white text-[9px] rounded-full w-4 h-4 hidden group-hover:flex items-center justify-center bg-red-600">×</button>
                                        </template>
                                    </div>
                                </td>
                                <td class="py-1 px-2">
                                    <input type="text" v-model="elementsState[element][idx].nickname" placeholder="Player..." class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:border-amber-500"/>
                                </td>
                                <td class="py-1 px-2">
                                    <input type="text" v-model="elementsState[element][idx].debuff" placeholder="Debuffs..." class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:border-amber-500"/>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg border border-gray-700">
                <h3 class="text-lg font-bold mb-3 uppercase tracking-wide text-amber-500">Main Roster Assignment (PSP)</h3>
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="border-b border-gray-700 text-gray-400 text-xs">
                            <th class="py-1 w-10">#</th>
                            <th class="py-1 w-20 text-center">Icon</th>
                            <th class="py-1 px-4 w-1/3">Nickname</th>
                            <th class="py-1 px-4">PSP Assignment Tasks</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="row in rosterSetup" :key="row.num" class="border-b border-gray-700/50 last:border-0 hover:bg-gray-750/30">
                            <td class="py-2 text-gray-400 font-mono font-bold">{{ row.num }}</td>
                            <td class="py-1 flex justify-center">
                                <div class="w-12 h-12 bg-gray-950 border border-gray-700 rounded flex items-center justify-center">
                                    <img :src="row.icon" class="w-10 h-10 object-contain rounded" onerror="this.src='https://placehold.co/40x40/374151/ffffff?text=PSP'"/>
                                </div>
                            </td>
                            <td class="py-1 px-4">
                                <input type="text" v-model="rosterState[row.num].nickname" placeholder="Type Nickname..." class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-sm focus:outline-none focus:border-amber-500"/>
                            </td>
                            <td class="py-1 px-4 text-gray-300 font-mono text-xs bg-gray-900/40 rounded">
                                {{ row.task }}
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        // UWAGA: Zmień ten adres na URL swojej strony po wrzuceniu plików do sieci (np. na GitHub Pages)
        // Adres musi kończyć się znakiem '/'
        const IMAGE_BASE_URL = 'https://twoja-nazwa-uzytkownika.github.io/nostale/';

        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const spDatabase = {
                    Swordsman: Array.from({length: 11}, (_, i) => ({ id: `s${i+1}`, tier: `SP ${i+1}`, img: `swordsman_sp${i+1}.png`, name: `swordsman_sp${i+1}.png` })),
                    Archer: Array.from({length: 11}, (_, i) => ({ id: `a${i+1}`, tier: `SP ${i+1}`, img: `archer_sp${i+1}.png`, name: `archer_sp${i+1}.png` })),
                    Mage: Array.from({length: 11}, (_, i) => ({ id: `m${i+1}`, tier: `SP ${i+1}`, img: `mage_sp${i+1}.png`, name: `mage_sp${i+1}.png` })),
                    MartialArtist: Array.from({length: 11}, (_, i) => ({ id: `ma${i+1}`, tier: `SP ${i+1}`, img: `martialartist_sp${i+1}.png`, name: `martialartist_sp${i+1}.png` }))
                };

                const rosterSetup = [
                    { num: 1, icon: 'psp_primary.png', task: '[Start Mobs] + [Platform Mobs] + [Phase 1+3]' },
                    { num: 2, icon: 'psp_primary.png', task: '[Start Mobs] + [Platform Mobs] + [Phase 1+3]' },
                    { num: 3, icon: 'psp_primary.png', task: '[Start Mobs] + [Platform Mobs] + [Phase 1+3]' },
                    { num: 4, icon: 'psp_primary.png', task: '[Start Mini] + [Platform Mini] + [Phase 2]' },
                    { num: 5, icon: 'psp_primary.png', task: '[Start Mini] + [Platform Mini] + [Phase 2]' },
                    { num: 6, icon: 'psp_secondary.png', task: '[Start Mobs] + [Phase 1]' },
                    { num: 7, icon: 'psp_secondary.png', task: '[Start Mini] + [Phase 2]' },
                    { num: 8, icon: 'psp_secondary.png', task: '[Platform Mobs] + [Phase 3]' },
                    { num: 9, icon: 'psp_elemental.png', task: '[Start Mini] + [Platform Mini] + [Phase 2]' },
                    { num: 10, icon: 'psp_elemental.png', task: '[Start Mini] + [Platform Mini] + [Phase 2]' },
                    { num: 11, icon: 'psp_elemental.png', task: '[Start Mobs] + [Platform Mobs] + [Phase 1+3]' },
                    { num: 12, icon: 'psp_elemental.png', task: '[Start Mobs] + [Platform Mobs] + [Phase 1+3]' },
                    { num: 13, icon: 'psp_ragnar.png', task: '[Start Mini] + [Platform Mini] + [Phase 2]' },
                    { num: 14, icon: 'psp_ragnar.png', task: '[Start Mini] + [Platform Mini] + [Phase 1+3]' },
                    { num: 15, icon: 'psp_nasus.png', task: '[Start Mini] + [Phase 2]' },
                    { num: 16, icon: 'psp_nasus.png', task: '[Phase 1] + [Phase 3]' },
                    { num: 17, icon: 'psp_jinn.png', task: '[Platform Mobs]' },
                    { num: 18, icon: 'psp_jinn.png', task: '[Platform Mobs]' },
                    { num: 19, icon: 'psp_jinn.png', task: '[Platform Mobs]' },
                    { num: 20, icon: 'psp_jinn.png', task: '[Platform Mobs]' }
                ];

                const createEmptySlots = () => ({ 1: {img:'', spName:'', nickname:'', debuff:''}, 2: {img:'', spName:'', nickname:'', debuff:''}, 3: {img:'', spName:'', nickname:'', debuff:''}, 4: {img:'', spName:'', nickname:'', debuff:''}, 5: {img:'', spName:'', nickname:'', debuff:''} });
                const elementsState = ref({ Fire: createEmptySlots(), Water: createEmptySlots(), Light: createEmptySlots(), Shadow: createEmptySlots() });
                const rosterState = ref({});
                rosterSetup.forEach(row => { rosterState.value[row.num] = { nickname: '' }; });

                const getElementColor = (el) => {
                    if (el === 'Fire') return 'text-red-500';
                    if (el === 'Water') return 'text-blue-400';
                    if (el === 'Light') return 'text-yellow-400';
                    return 'text-purple-500';
                };

                const clearSlot = (element, idx) => { 
                    elementsState.value[element][idx].img = ''; 
                    elementsState.value[element][idx].spName = ''; 
                };

                const exportToExcel = async () => {
                    const workbook = new ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('Roster Data');

                    const darkBg = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F1F1F' } };
                    const headerBg = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF333333' } };
                    const cellBg = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF3A3A3A' } };
                    const textWhite = { color: { argb: 'FFFFFFFF' }, name: 'Calibri', size: 20 };
                    const borderThin = {
                        top: { style: 'thin', color: { argb: 'FF000000' } }, left: { style: 'thin', color: { argb: 'FF000000' } },
                        bottom: { style: 'thin', color: { argb: 'FF000000' } }, right: { style: 'thin', color: { argb: 'FF000000' } }
                    };

                    for(let r = 1; r <= 25; r++) {
                        for(let c = 1; c <= 15; c++) {
                            sheet.getCell(r, c).fill = darkBg;
                        }
                    }

                    sheet.columns = [
                        { width: 8 },  { width: 18 },  { width: 25 }, { width: 35 }, { width: 4 }, 
                        { width: 8 },  { width: 18 },  { width: 25 }, { width: 35 }, { width: 4 }, 
                        { width: 8 },  { width: 20 },  { width: 25 }, { width: 85 }
                    ];

                    const styleTitle = (ref, value, colorArgb) => {
                        const cell = sheet.getCell(ref);
                        cell.value = value;
                        cell.font = { color: { argb: colorArgb }, name: 'Calibri', size: 24, bold: true };
                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        sheet.getRow(cell.row).height = 45;
                    };

                    const styleCell = (ref, value, isCenter) => {
                        const cell = sheet.getCell(ref);
                        cell.value = value;
                        cell.fill = cellBg;
                        cell.font = textWhite;
                        cell.border = borderThin;
                        cell.alignment = { horizontal: isCenter ? 'center' : 'left', vertical: 'middle', wrapText: true };
                        sheet.getRow(cell.row).height = 65; 
                    };

                    // Nagłówki sekcji
                    sheet.mergeCells('B1:D1'); styleTitle('B1', 'Fire', 'FFFF0000');
                    sheet.mergeCells('G1:I1'); styleTitle('G1', 'Water', 'FF0070C0');

                    const applyHeaders = (startCol, headers) => {
                        headers.forEach((h, i) => {
                            const c = sheet.getCell(2, startCol + i);
                            c.value = h; c.fill = headerBg; c.font = textWhite; c.border = borderThin; c.alignment = { horizontal: 'center', vertical: 'middle' };
                        });
                    };
                    
                    applyHeaders(1, ['#', 'SP', 'Nickname', 'Debuff']);  
                    applyHeaders(6, ['#', 'SP', 'Nickname', 'Debuff']);  
                    applyHeaders(11, ['#', 'Icon', 'Nickname', 'PSP']);
                    sheet.getRow(2).height = 45;

                    // Dane: Fire & Water (Wstrzykiwanie Formuły IMAGE bezpośrednio jako wartość komórki)
                    for(let i=1; i<=5; i++) {
                        let row = 2 + i;
                        styleCell(`A${row}`, i, true);
                        
                        // Kolumna SP - Formuła Excela
                        let fireSp = elementsState.value['Fire'][i].img;
                        styleCell(`B${row}`, fireSp ? { formula: `IMAGE("${IMAGE_BASE_URL}${fireSp}")` } : '', true);
                        
                        styleCell(`C${row}`, elementsState.value['Fire'][i].nickname, false);
                        styleCell(`D${row}`, elementsState.value['Fire'][i].debuff, false);

                        styleCell(`F${row}`, i, true);
                        
                        let waterSp = elementsState.value['Water'][i].img;
                        styleCell(`G${row}`, waterSp ? { formula: `IMAGE("${IMAGE_BASE_URL}${waterSp}")` } : '', true);
                        
                        styleCell(`H${row}`, elementsState.value['Water'][i].nickname, false);
                        styleCell(`I${row}`, elementsState.value['Water'][i].debuff, false);
                    }

                    // Sekcja 2: Light & Shadow
                    sheet.mergeCells('B8:D8'); styleTitle('B8', 'Light', 'FFFFFF00');
                    sheet.mergeCells('G8:I8'); styleTitle('G8', 'Shadow', 'FF7030A0');
                    sheet.getRow(8).height = 45;

                    const applyHeadersR9 = (startCol, headers) => {
                        headers.forEach((h, i) => {
                            const c = sheet.getCell(9, startCol + i);
                            c.value = h; c.fill = headerBg; c.font = textWhite; c.border = borderThin; c.alignment = { horizontal: 'center', vertical: 'middle' };
                        });
                    };
                    applyHeadersR9(1, ['#', 'SP', 'Nickname', 'Debuff']);
                    applyHeadersR9(6, ['#', 'SP', 'Nickname', 'Debuff']);
                    sheet.getRow(9).height = 45;

                    for(let i=1; i<=5; i++) {
                        let row = 9 + i;
                        styleCell(`A${row}`, i, true);
                        
                        let lightSp = elementsState.value['Light'][i].img;
                        styleCell(`B${row}`, lightSp ? { formula: `IMAGE("${IMAGE_BASE_URL}${lightSp}")` } : '', true);
                        
                        styleCell(`C${row}`, elementsState.value['Light'][i].nickname, false);
                        styleCell(`D${row}`, elementsState.value['Light'][i].debuff, false);

                        styleCell(`F${row}`, i, true);
                        
                        let shadowSp = elementsState.value['Shadow'][i].img;
                        styleCell(`G${row}`, shadowSp ? { formula: `IMAGE("${IMAGE_BASE_URL}${shadowSp}")` } : '', true);
                        
                        styleCell(`H${row}`, elementsState.value['Shadow'][i].nickname, false);
                        styleCell(`I${row}`, elementsState.value['Shadow'][i].debuff, false);
                    }

                    // Dane Roster PSP - Formuła Excela
                    for (let idx = 0; idx < rosterSetup.length; idx++) {
                        const obj = rosterSetup[idx];
                        let row = 2 + idx;
                        styleCell(`K${row}`, obj.num, true);
                        
                        // Ikona PSP osadzona w komórce za pomocą formuły
                        styleCell(`L${row}`, { formula: `IMAGE("${IMAGE_BASE_URL}${obj.icon}")` }, true);
                        
                        styleCell(`M${row}`, rosterState.value[obj.num].nickname, false);
                        styleCell(`N${row}`, obj.task, false);
                    }

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    saveAs(blob, 'Raid_Roster_Locked_Icons.xlsx');
                };

                onMounted(() => {
                    Object.keys(spDatabase).forEach(className => {
                        const el = document.getElementById('source-' + className);
                        new Sortable(el, {
                            group: { name: 'shared', pull: 'clone', put: false },
                            sort: false,
                            ghostClass: 'drag-ghost',
                            animation: 150
                        });
                    });

                    document.querySelectorAll('.target-dropzone').forEach(dropzone => {
                        new Sortable(dropzone, {
                            group: 'shared',
                            onAdd: (evt) => {
                                const spImg = evt.item.getAttribute('data-img');
                                const spName = evt.item.getAttribute('data-spname');
                                const group = dropzone.getAttribute('data-group');
                                const idx = dropzone.getAttribute('data-idx');

                                elementsState.value[group][idx].img = spImg;
                                elementsState.value[group][idx].spName = spName;
                                evt.item.remove();
                            }
                        });
                    });
                });

                return { spDatabase, rosterSetup, elementsState, rosterState, getElementColor, clearSlot, exportToExcel };
            }
        }).mount('#app');
    </script>
</body>
</html>
